<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #2ECC71; stroke: #27AE60; stroke-width: 2; }
      .text { fill: white; font-family: Arial; font-size: 14px; text-anchor: middle; }
      .title { fill: #333; font-family: Arial; font-size: 18px; font-weight: bold; }
      .metric { fill: #f9f9f9; stroke: #ddd; stroke-width: 1; }
      .metric-text { fill: #333; font-family: Arial; font-size: 12px; text-anchor: middle; }
    </style>
  </defs>
  
  <text x="400" y="30" class="title">Power BI Dashboard Preview - KPI Monitoring</text>
  
  <!-- KPI Cards -->
  <rect x="50" y="60" width="160" height="100" class="box"/>
  <text x="130" y="90" class="text">Total Revenue</text>
  <text x="130" y="130" class="text" style="font-size: 20px; font-weight: bold;">$824.45K</text>
  
  <rect x="270" y="60" width="160" height="100" class="box"/>
  <text x="350" y="90" class="text">Transactions</text>
  <text x="350" y="130" class="text" style="font-size: 20px; font-weight: bold;">15,840</text>
  
  <rect x="490" y="60" width="160" height="100" class="box"/>
  <text x="570" y="90" class="text">Avg Order Value</text>
  <text x="570" y="130" class="text" style="font-size: 20px; font-weight: bold;">$52.07</text>
  
  <!-- Customer Metrics -->
  <rect x="50" y="200" width="160" height="100" class="box"/>
  <text x="130" y="230" class="text">Total Customers</text>
  <text x="130" y="270" class="text" style="font-size: 20px; font-weight: bold;">1,200</text>
  
  <rect x="270" y="200" width="160" height="100" class="box"/>
  <text x="350" y="230" class="text">Retention Rate</text>
  <text x="350" y="270" class="text" style="font-size: 20px; font-weight: bold;">28.3%</text>
  
  <rect x="490" y="200" width="160" height="100" class="box"/>
  <text x="570" y="230" class="text">Revenue Growth</text>
  <text x="570" y="270" class="text" style="font-size: 20px; font-weight: bold;">+12.5%</text>
  
  <!-- Chart Area -->
  <rect x="50" y="340" width="600" height="220" class="metric"/>
  <text x="350" y="365" class="metric-text" style="font-size: 14px; font-weight: bold;">Revenue Trend (Last 12 Months)</text>
  
  <!-- Sample bar chart -->
  <rect x="70" y="430" width="30" height="80" fill="#4A90E2"/>
  <rect x="120" y="420" width="30" height="90" fill="#4A90E2"/>
  <rect x="170" y="410" width="30" height="100" fill="#4A90E2"/>
  <rect x="220" y="400" width="30" height="110" fill="#4A90E2"/>
  <rect x="270" y="390" width="30" height="120" fill="#4A90E2"/>
  <rect x="320" y="380" width="30" height="130" fill="#4A90E2"/>
  <rect x="370" y="375" width="30" height="135" fill="#2ECC71"/>
  <rect x="420" y="370" width="30" height="140" fill="#2ECC71"/>
  <rect x="470" y="365" width="30" height="145" fill="#2ECC71"/>
  <rect x="520" y="360" width="30" height="150" fill="#2ECC71"/>
  <rect x="570" y="355" width="30" height="155" fill="#2ECC71"/>
  <rect x="620" y="350" width="30" height="160" fill="#2ECC71"/>
</svg>
